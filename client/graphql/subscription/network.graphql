subscription memberInformation($nwid: String, $userid: ID) {
  memberInformation(nwid: $nwid, userid: $userid) {
    members {
      nodeid
      name
      identity
      online
      address
      authorized
      ipAssignments
      nwid
      peers {
        address
        latency
        role
        version
        versionMajor
        versionMinor
        versionRev
        paths {
          active
          address
          expired
          lastReceive
          lastSend
          preferred
        }
      }
    }
  }
}
