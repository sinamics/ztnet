query ztnetworks {
  allNetworks
}

query networkDetails($nwid: ID!) {
  networkDetails(nwid: $nwid) {
    network {
      name
      nwid
      private
      cidr
      ipAssignmentPools {
        ipRangeEnd
        ipRangeStart
      }
      routes {
        target
      }
    }
    members {
      lastseen
      identity
      nodeid
      id
      name
      ip
      address
      authorized
      creationTime
      ipAssignments
      noAutoAssignIps
      nwid
      peers {
        address
        latency
        role
        version
        versionMajor
        versionMinor
        versionRev
        paths {
          active
          address
          expired
          lastReceive
          lastSend
          preferred
          trustedPathId
        }
      }
    }
    zombieMembers {
      nodeid
      identity
      id
      name
      ip
      address
      authorized
      creationTime
      ipAssignments
      noAutoAssignIps
      nwid
    }
    error {
      message
    }
  }
}
